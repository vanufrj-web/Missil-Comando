<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000a05">
<title>MISSILE COMMAND</title>
<style>
  :root {
    --green: #00ff88;
    --red: #ff3333;
    --blue: #44aaff;
    --amber: #ffcc00;
    --bg: #000a05;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
  }

  /* ── HUD compacto para mobile ── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px 0;
    pointer-events: none;
    z-index: 10;
    height: 44px;
    background: linear-gradient(to bottom, rgba(0,10,5,0.7) 0%, transparent 100%);
  }

  .hud-block { display: flex; flex-direction: column; gap: 0; }

  .hud-label {
    font-size: 7px;
    color: var(--green);
    opacity: 0.55;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 18px;
    font-weight: bold;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    letter-spacing: 1px;
    line-height: 1;
  }

  .hud-center { text-align: center; }

  .hud-lives {
    display: flex;
    gap: 5px;
    justify-content: flex-end;
    margin-top: 2px;
  }

  .life-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .life-dot.dead { background: #112; box-shadow: none; border: 1px solid #224; }

  /* ── OVERLAY ── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,10,5,0.92);
    z-index: 20;
    pointer-events: all;
    padding: 20px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(24px, 10vw, 40px);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 24px var(--green);
    letter-spacing: 5px;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .overlay-title.red {
    color: var(--red);
    text-shadow: 0 0 24px var(--red);
  }

  .overlay-sub {
    font-size: 10px;
    color: var(--green);
    opacity: 0.6;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-align: center;
  }

  .stat-row {
    display: flex;
    gap: 32px;
    margin-bottom: 24px;
  }

  .stat-box { text-align: center; }

  .stat-num {
    font-size: 22px;
    font-weight: bold;
    color: var(--amber);
    text-shadow: 0 0 10px var(--amber);
  }

  .stat-lbl {
    font-size: 8px;
    color: var(--amber);
    opacity: 0.55;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .btn {
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 3px;
    color: var(--bg);
    background: var(--green);
    border: none;
    padding: 16px 40px;
    cursor: pointer;
    box-shadow: 0 0 20px var(--green);
    border-radius: 2px;
    min-width: 180px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.95); }

  .tip {
    margin-top: 14px;
    font-size: 9px;
    color: var(--green);
    opacity: 0.4;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }

  /* ── LEVEL BANNER ── */
  #level-banner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    font-weight: bold;
    color: var(--amber);
    text-shadow: 0 0 16px var(--amber);
    letter-spacing: 4px;
    text-align: center;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: pre-line;
  }

  /* ── CROSSHAIR ── */
  #crosshair {
    position: absolute;
    width: 40px; height: 40px;
    margin-left: -20px; margin-top: -20px;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
    transition: opacity 0.15s;
  }

  /* ── SCANLINES (leve, apenas visual) ── */
  #scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.05) 3px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanline"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="hud-score">0</div>
  </div>
  <div class="hud-block hud-center">
    <div class="hud-label">NÍVEL</div>
    <div class="hud-value" id="hud-level">1</div>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <div class="hud-label">VIDAS</div>
    <div class="hud-lives" id="hud-lives"></div>
  </div>
</div>

<!-- Level banner -->
<div id="level-banner"></div>

<!-- Crosshair -->
<div id="crosshair">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="11" stroke="#00ff88" stroke-width="1.5" opacity="0.85"/>
    <line x1="20" y1="1" x2="20" y2="8" stroke="#00ff88" stroke-width="1.5" opacity="0.85"/>
    <line x1="20" y1="32" x2="20" y2="39" stroke="#00ff88" stroke-width="1.5" opacity="0.85"/>
    <line x1="1" y1="20" x2="8" y2="20" stroke="#00ff88" stroke-width="1.5" opacity="0.85"/>
    <line x1="32" y1="20" x2="39" y2="20" stroke="#00ff88" stroke-width="1.5" opacity="0.85"/>
    <circle cx="20" cy="20" r="2" fill="#00ff88" opacity="0.95"/>
  </svg>
</div>

<!-- Overlay -->
<div id="overlay">
  <div class="overlay-title" id="ov-title">MISSILE<br>COMMAND</div>
  <div class="overlay-sub" id="ov-sub">DEFENDA SUA CIDADE</div>
  <div class="stat-row" id="ov-stats" style="display:none">
    <div class="stat-box">
      <div class="stat-num" id="ov-score">0</div>
      <div class="stat-lbl">PONTUAÇÃO</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="ov-level">1</div>
      <div class="stat-lbl">NÍVEL</div>
    </div>
  </div>
  <button class="btn" id="ov-btn" onclick="startGame()">[ INICIAR ]</button>
  <div class="tip" id="ov-tip" style="display:none"></div>
  <div class="tip">TOQUE NA TELA PARA ATIRAR</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CANVAS SETUP — DPR adaptativo para Android
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, GY;
// Para Android, limitar DPR a 2 para economizar GPU
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  canvas.width  = vw * DPR;
  canvas.height = vh * DPR;
  canvas.style.width  = vw + 'px';
  canvas.style.height = vh + 'px';
  ctx.scale(DPR, DPR);
  W  = vw;
  H  = vh;
  GY = H - 52;
}
resize();
window.addEventListener('resize', () => {
  resize();
  if (stars.length > 0) initStars();
});

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const MAX_LIVES   = 5;
const MAX_LEVEL   = 20;
const CITY_W      = 32;
const BASE_COLORS = ['#44aaff', '#00ff88', '#ff88aa'];
const MISSILE_PALETTE = ['#ff3333','#ff6622','#ff2266','#ff8800','#ffcc00'];

const LEVEL_CONFIG = [
  { missiles:  8, speed: 0.50 },
  { missiles: 10, speed: 0.54 },
  { missiles: 12, speed: 0.58 },
  { missiles: 14, speed: 0.62 },
  { missiles: 16, speed: 0.66 },
  { missiles: 18, speed: 0.70 },
  { missiles: 20, speed: 0.74 },
  { missiles: 22, speed: 0.78 },
  { missiles: 24, speed: 0.82 },
  { missiles: 26, speed: 0.86 },
  { missiles: 28, speed: 0.90 },
  { missiles: 29, speed: 0.93 },
  { missiles: 30, speed: 0.96 },
  { missiles: 31, speed: 0.99 },
  { missiles: 32, speed: 1.02 },
  { missiles: 34, speed: 1.05 },
  { missiles: 36, speed: 1.08 },
  { missiles: 38, speed: 1.11 },
  { missiles: 39, speed: 1.14 },
  { missiles: 40, speed: 1.18 },
];

// ═══════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════
let score, level, lives, gameOver, running, paused;
let missiles, interceptors, explosions, cities, bases, debris;
let asteroids, guidedMissiles, satellites, clusterBombs, migFighters;
let stars = [];
let frameCount, crosshairTimer = 0;
let highScore = 0;
let scoreTexts = [];
let missilesLeft = 0, spawnTimer = 0, levelEnding = false, levelEndTimer = 0;

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function initGame() {
  score = 0; level = 1; lives = MAX_LIVES;
  gameOver = false; running = true; paused = false;
  frameCount = 0; levelEnding = false; levelEndTimer = 0;
  missiles = []; interceptors = []; explosions = [];
  debris = []; scoreTexts = [];
  asteroids = []; guidedMissiles = []; satellites = [];
  clusterBombs = []; migFighters = [];
  initStars(); initCities(); initBases();
  startLevel(); updateHUD(); hideCrosshairEl();
}

function initStars() {
  // Menos estrelas para mobile
  stars = Array.from({ length: 50 }, () => ({
    x: Math.random() * W,
    y: Math.random() * GY * 0.85,
    r: Math.random() * 1.2 + 0.2,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.025 + 0.01
  }));
}

function initCities() {
  const slots = [0.13, 0.25, 0.38, 0.62, 0.75, 0.87];
  cities = slots.map(p => ({ x: W * p, alive: true, flashTimer: 0 }));
}

function initBases() {
  bases = [
    { x: W * 0.1, y: GY, ammo: Infinity, color: BASE_COLORS[0], active: true },
    { x: W * 0.5, y: GY, ammo: Infinity, color: BASE_COLORS[1], active: true },
    { x: W * 0.9, y: GY, ammo: Infinity, color: BASE_COLORS[2], active: true }
  ];
}

function startLevel() {
  const cfg = LEVEL_CONFIG[Math.min(level - 1, LEVEL_CONFIG.length - 1)];
  missilesLeft = cfg.missiles;
  spawnTimer = 80;
  levelEnding = false; levelEndTimer = 0;
  asteroids = []; guidedMissiles = []; satellites = [];
  clusterBombs = []; migFighters = [];
}

// ═══════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-level').textContent = level;
  const livesEl = document.getElementById('hud-lives');
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement('div');
    d.className = 'life-dot' + (i < lives ? '' : ' dead');
    livesEl.appendChild(d);
  }
}

// ═══════════════════════════════════════════════════════
// DRAW — Sem shadowBlur excessivo no mobile (lento no Android)
// ═══════════════════════════════════════════════════════
function drawStars() {
  for (let s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(180,220,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  ctx.fillStyle = '#0a2010';
  ctx.fillRect(0, GY, W, H - GY);
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GY); ctx.lineTo(W, GY);
  ctx.stroke();
}

const BUILDING_DATA = [
  {w:5, h:16}, {w:4, h:11}, {w:6, h:20},
  {w:4, h:13}, {w:5, h:15}, {w:4, h:9}
];

function drawCity(c) {
  if (!c.alive) return;
  if (c.flashTimer > 0) {
    c.flashTimer--;
    if (c.flashTimer % 4 < 2) return;
  }
  ctx.fillStyle = '#ffcc44';
  let ox = c.x - 16;
  for (let b of BUILDING_DATA) {
    ctx.fillRect(ox, GY - b.h, b.w, b.h);
    ox += b.w + 1;
  }
}

function drawBase(b) {
  if (!b.active) {
    ctx.fillStyle = '#223';
    ctx.beginPath();
    ctx.moveTo(b.x - 12, GY);
    ctx.lineTo(b.x, GY - 16);
    ctx.lineTo(b.x + 12, GY);
    ctx.closePath();
    ctx.fill();
    return;
  }
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.moveTo(b.x - 13, GY);
  ctx.lineTo(b.x, GY - 20);
  ctx.lineTo(b.x + 13, GY);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ffffff88';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(b.x, GY - 12);
  ctx.lineTo(b.x, GY - 22);
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════
// MISSILES — otimizado: trilha mais curta
// ═══════════════════════════════════════════════════════
function spawnMissile() {
  const cfg = LEVEL_CONFIG[Math.min(level - 1, LEVEL_CONFIG.length - 1)];
  const speed = cfg.speed * (0.85 + Math.random() * 0.30);
  const sx = Math.random() * W;
  const tx = Math.random() * W;
  const dx = tx - sx, dy = GY;
  const dist = Math.hypot(dx, dy);
  missiles.push({
    x: sx, y: 0,
    vx: dx / dist * speed,
    vy: dy / dist * speed,
    tx, ty: GY,
    trail: [],
    color: MISSILE_PALETTE[Math.floor(Math.random() * MISSILE_PALETTE.length)]
  });
}

function updateMissiles() {
  for (let m of missiles) {
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 30) m.trail.shift(); // trilha menor para mobile
    m.x += m.vx; m.y += m.vy;
  }
}

function drawMissiles() {
  for (let m of missiles) {
    if (m.trail.length < 2) continue;
    ctx.save();
    ctx.lineCap = 'round';
    const len = m.trail.length;
    for (let i = 1; i < len; i++) {
      const t = i / len;
      ctx.globalAlpha = t * 0.8;
      ctx.strokeStyle = m.color;
      ctx.lineWidth = 0.5 + t * 3;
      ctx.beginPath();
      ctx.moveTo(m.trail[i-1].x, m.trail[i-1].y);
      ctx.lineTo(m.trail[i].x, m.trail[i].y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// ASTEROIDS
// ═══════════════════════════════════════════════════════
function spawnAsteroid() {
  const isRed = Math.random() < 0.45;
  const size = 10 + Math.random() * 16;
  const speed = 0.6 + Math.random() * 1.0 + level * 0.04;
  const sides = 6 + Math.floor(Math.random() * 3);
  const pts = [];
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2;
    const r = size * (0.65 + Math.random() * 0.35);
    pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  asteroids.push({
    x: Math.random() * W, y: -size,
    vx: (Math.random() - 0.5) * 0.8, vy: speed,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    pts, size,
    color: isRed ? '#ff4422' : '#ddddcc',
    isRed, hp: isRed ? 2 : 1
  });
}

function updateAsteroids() {
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    if (a.y > GY + a.size) {
      addExplosion(a.x, GY, 90 + a.size * 2, a.isRed ? '#ff3300' : '#888877', true);
      addDebris(a.x, GY, a.color);
      for (let c of cities) {
        if (c.alive && Math.abs(c.x - a.x) < a.size + 26) {
          c.alive = false;
          addExplosion(c.x, GY - 8, 120, '#ff4400', true);
        }
      }
      for (let b of bases) {
        if (b.active && Math.abs(b.x - a.x) < a.size + 18) b.active = false;
      }
      asteroids.splice(i, 1);
    }
  }
}

function drawAsteroids() {
  for (let a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.fillStyle = a.color;
    ctx.strokeStyle = a.isRed ? '#ff664488' : '#ffffff55';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(a.pts[0].x, a.pts[0].y);
    for (let i = 1; i < a.pts.length; i++) ctx.lineTo(a.pts[i].x, a.pts[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// GUIDED MISSILES
// ═══════════════════════════════════════════════════════
function spawnGuidedMissile() {
  guidedMissiles.push({
    x: Math.random() * W, y: -10,
    vx: 0, vy: 0.5 + level * 0.04,
    speed: 0.5 + level * 0.04,
    trail: [], color: '#ff22ff', wobble: 0,
    wobbleSpeed: 0.07 + Math.random() * 0.04
  });
}

function updateGuidedMissiles() {
  const aliveCities = cities.filter(c => c.alive);
  for (let i = guidedMissiles.length - 1; i >= 0; i--) {
    const gm = guidedMissiles[i];
    gm.trail.push({ x: gm.x, y: gm.y });
    if (gm.trail.length > 20) gm.trail.shift();
    gm.wobble += gm.wobbleSpeed;
    let tx = W / 2, ty = GY;
    if (aliveCities.length > 0) {
      let best = aliveCities[0], bestD = Infinity;
      for (let c of aliveCities) {
        const d = Math.hypot(c.x - gm.x, GY - gm.y);
        if (d < bestD) { bestD = d; best = c; }
      }
      tx = best.x; ty = GY;
    }
    const dx = tx - gm.x, dy = ty - gm.y;
    const dist = Math.hypot(dx, dy) || 1;
    gm.vx = gm.vx * 0.92 + (dx / dist * gm.speed) * 0.08;
    gm.vy = gm.vy * 0.92 + (dy / dist * gm.speed) * 0.08;
    const spd = Math.hypot(gm.vx, gm.vy) || 1;
    gm.vx = gm.vx / spd * gm.speed;
    gm.vy = gm.vy / spd * gm.speed;
    gm.x += gm.vx + Math.sin(gm.wobble) * 0.5;
    gm.y += gm.vy;
    if (gm.y >= GY) {
      addExplosion(gm.x, GY, 110, '#ff00ff', true);
      addDebris(gm.x, GY, gm.color);
      for (let c of cities) {
        if (c.alive && Math.abs(c.x - gm.x) < CITY_W + 10) {
          c.alive = false;
          addExplosion(c.x, GY - 8, 130, '#ff44ff', true);
        }
      }
      guidedMissiles.splice(i, 1);
    }
  }
}

function drawGuidedMissiles() {
  for (let gm of guidedMissiles) {
    if (gm.trail.length < 2) continue;
    ctx.save();
    for (let i = 1; i < gm.trail.length; i++) {
      const t = i / gm.trail.length;
      ctx.globalAlpha = t * 0.6;
      ctx.strokeStyle = gm.color;
      ctx.lineWidth = t * 2.5;
      ctx.beginPath();
      ctx.moveTo(gm.trail[i-1].x, gm.trail[i-1].y);
      ctx.lineTo(gm.trail[i].x, gm.trail[i].y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = gm.color;
    ctx.beginPath();
    ctx.moveTo(gm.x, gm.y - 6);
    ctx.lineTo(gm.x + 3, gm.y);
    ctx.lineTo(gm.x, gm.y + 6);
    ctx.lineTo(gm.x - 3, gm.y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// SATELLITES
// ═══════════════════════════════════════════════════════
function spawnSatellite() {
  const fromLeft = Math.random() < 0.5;
  const speed = 1.0 + level * 0.07;
  satellites.push({
    x: fromLeft ? -60 : W + 60,
    y: 40 + Math.random() * (GY * 0.4),
    vx: fromLeft ? speed : -speed,
    fromLeft,
    bombTimer: 80 + Math.floor(Math.random() * 60),
    color: '#00eeff', rot: 0
  });
}

function updateSatellites() {
  for (let i = satellites.length - 1; i >= 0; i--) {
    const sat = satellites[i];
    sat.x += sat.vx; sat.rot += 0.04; sat.bombTimer--;
    if (sat.bombTimer <= 0) {
      const tx = Math.random() * W;
      const dx = tx - sat.x, dy = GY - sat.y;
      const dist = Math.hypot(dx, dy) || 1;
      const bspd = 0.7 + level * 0.03;
      missiles.push({
        x: sat.x, y: sat.y,
        vx: dx / dist * bspd, vy: dy / dist * bspd,
        tx, ty: GY, trail: [],
        color: MISSILE_PALETTE[Math.floor(Math.random() * MISSILE_PALETTE.length)]
      });
      sat.bombTimer = 80 + Math.floor(Math.random() * 60);
    }
    if ((sat.fromLeft && sat.x > W + 80) || (!sat.fromLeft && sat.x < -80)) {
      satellites.splice(i, 1);
    }
  }
}

function drawSatellites() {
  for (let sat of satellites) {
    ctx.save();
    ctx.translate(sat.x, sat.y);
    ctx.strokeStyle = sat.color;
    ctx.fillStyle = sat.color;
    ctx.lineWidth = 1.5;
    ctx.fillRect(-8, -4, 16, 8);
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-26, 0); ctx.stroke();
    ctx.strokeRect(-26, -5, 10, 10);
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(26, 0); ctx.stroke();
    ctx.strokeRect(16, -5, 10, 10);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// CLUSTER BOMBS
// ═══════════════════════════════════════════════════════
function spawnClusterBomb() {
  const speed = 0.35 + Math.random() * 0.4 + level * 0.02;
  clusterBombs.push({
    x: 60 + Math.random() * (W - 120), y: -18,
    vx: (Math.random() - 0.5) * 0.5, vy: speed,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.03,
    size: 12, pulse: 0,
    color: '#ff8800'
  });
}

function spawnClusterFragment(x, y) {
  for (let i = 0; i < 3; i++) {
    const angle = (i / 3) * Math.PI * 2 + Math.random() * 0.5;
    const spd = 1.0 + Math.random() * 1.2 + level * 0.03;
    const tx = x + Math.cos(angle) * (W * 0.3);
    const dist = Math.hypot(tx - x, GY - y) || 1;
    missiles.push({
      x, y,
      vx: (tx - x) / dist * spd, vy: (GY - y) / dist * spd,
      tx, ty: GY, trail: [], color: '#ffaa00'
    });
  }
}

function updateClusterBombs() {
  for (let i = clusterBombs.length - 1; i >= 0; i--) {
    const cb = clusterBombs[i];
    cb.x += cb.vx; cb.y += cb.vy;
    cb.rot += cb.rotSpeed; cb.pulse += 0.12;
    if (cb.y > GY + cb.size) {
      addExplosion(cb.x, GY, 130, '#ff8800', true);
      addDebris(cb.x, GY, cb.color);
      spawnClusterFragment(cb.x, GY);
      for (let c of cities) {
        if (c.alive && Math.abs(c.x - cb.x) < cb.size + 26) {
          c.alive = false;
          addExplosion(c.x, GY - 8, 120, '#ff6600', true);
        }
      }
      clusterBombs.splice(i, 1);
    }
  }
}

function drawClusterBombs() {
  for (let cb of clusterBombs) {
    ctx.save();
    ctx.translate(cb.x, cb.y);
    ctx.rotate(cb.rot);
    ctx.fillStyle = cb.color;
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
      const a = (k / 6) * Math.PI * 2;
      const r = cb.size * (k % 2 === 0 ? 1 : 0.8);
      if (k === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(cb.pulse * 2);
    ctx.beginPath();
    ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// MiG FIGHTERS
// ═══════════════════════════════════════════════════════
function spawnMigFighter() {
  const fromLeft = Math.random() < 0.5;
  const speed = 1.8 + level * 0.1;
  migFighters.push({
    x: fromLeft ? -50 : W + 50,
    y: GY * 0.1 + Math.random() * GY * 0.45,
    vx: fromLeft ? speed : -speed,
    fromLeft,
    burstTimer: 60 + Math.floor(Math.random() * 40),
    burstCount: 0, burstMax: 3, burstDelay: 0,
    color: '#ff4466', trail: []
  });
}

function updateMigFighters() {
  for (let i = migFighters.length - 1; i >= 0; i--) {
    const mig = migFighters[i];
    mig.trail.push({ x: mig.x, y: mig.y });
    if (mig.trail.length > 14) mig.trail.shift();
    mig.x += mig.vx;
    if (mig.burstDelay > 0) {
      mig.burstDelay--;
    } else {
      mig.burstTimer--;
      if (mig.burstTimer <= 0 && mig.burstCount < mig.burstMax) {
        const angle = (Math.PI * 0.5) + (mig.burstCount - 1) * 0.3;
        const bspd = 0.9 + level * 0.03;
        missiles.push({
          x: mig.x, y: mig.y,
          vx: Math.cos(angle) * bspd * (mig.fromLeft ? 0.3 : -0.3),
          vy: Math.abs(Math.sin(angle)) * bspd,
          tx: mig.x + Math.cos(angle) * 300, ty: GY,
          trail: [], color: MISSILE_PALETTE[Math.floor(Math.random() * MISSILE_PALETTE.length)]
        });
        mig.burstCount++;
        mig.burstDelay = 8;
        if (mig.burstCount >= mig.burstMax) {
          mig.burstTimer = 90 + Math.floor(Math.random() * 50);
          mig.burstCount = 0;
        }
      }
    }
    if ((mig.fromLeft && mig.x > W + 70) || (!mig.fromLeft && mig.x < -70)) {
      migFighters.splice(i, 1);
    }
  }
}

function drawMigFighters() {
  for (let mig of migFighters) {
    ctx.save();
    ctx.translate(mig.x, mig.y);
    if (!mig.fromLeft) ctx.scale(-1, 1);
    ctx.fillStyle = mig.color;
    ctx.beginPath();
    ctx.moveTo(20, 0); ctx.lineTo(-12, 4); ctx.lineTo(-12, -4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffccdd';
    ctx.beginPath();
    ctx.ellipse(7, 0, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = mig.color;
    ctx.beginPath();
    ctx.moveTo(3, 0); ctx.lineTo(-9, 15); ctx.lineTo(-12, 4);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, 0); ctx.lineTo(-9, -15); ctx.lineTo(-12, -4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(-12, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// INTERCEPTORS
// ═══════════════════════════════════════════════════════
function findNearestBase(tx, ty) {
  let best = null, bestDist = Infinity;
  for (let b of bases) {
    if (!b.active) continue;
    const d = Math.hypot(b.x - tx, b.y - ty);
    if (d < bestDist) { bestDist = d; best = b; }
  }
  return best;
}

function fire(tx, ty) {
  const base = findNearestBase(tx, ty);
  if (!base) return;
  const dx = tx - base.x, dy = ty - base.y;
  const dist = Math.hypot(dx, dy);
  const speed = 7 + level * 0.3;
  interceptors.push({
    x: base.x, y: base.y,
    vx: dx / dist * speed, vy: dy / dist * speed,
    tx, ty, trail: [], bColor: base.color
  });
}

function updateInterceptors() {
  for (let i = interceptors.length - 1; i >= 0; i--) {
    const ic = interceptors[i];
    ic.trail.push({ x: ic.x, y: ic.y });
    if (ic.trail.length > 10) ic.trail.shift();
    ic.x += ic.vx; ic.y += ic.vy;
    if (Math.hypot(ic.x - ic.tx, ic.y - ic.ty) < 10) {
      addExplosion(ic.x, ic.y, 80 + level * 3, '#88ccff', false);
      interceptors.splice(i, 1);
    }
  }
}

function drawInterceptors() {
  for (let ic of interceptors) {
    if (ic.trail.length < 2) continue;
    ctx.save();
    ctx.lineWidth = 1.5;
    for (let i = 1; i < ic.trail.length; i++) {
      const alpha = i / ic.trail.length;
      ctx.strokeStyle = `rgba(200,230,255,${alpha * 0.85})`;
      ctx.beginPath();
      ctx.moveTo(ic.trail[i-1].x, ic.trail[i-1].y);
      ctx.lineTo(ic.trail[i].x, ic.trail[i].y);
      ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ic.x, ic.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// EXPLOSIONS — simplificadas para mobile
// ═══════════════════════════════════════════════════════
function addExplosion(x, y, maxR, color, ground) {
  explosions.push({ x, y, r: 0, maxR, color, alpha: 1, growing: true, ground: !!ground });
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    if (ex.growing) {
      ex.r += ex.maxR < 80 ? 3.5 : 3.0;
      if (ex.r >= ex.maxR) ex.growing = false;
    } else {
      ex.r -= 1.2;
      ex.alpha -= 0.030;
    }
    if (ex.alpha <= 0 || ex.r <= 0) explosions.splice(i, 1);
  }
}

function drawExplosions() {
  for (let ex of explosions) {
    ctx.save();
    ctx.globalAlpha = ex.alpha;
    // Gradiente radial simplificado (mais leve)
    const grd = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
    grd.addColorStop(0, ex.color + 'dd');
    grd.addColorStop(0.5, ex.color + '88');
    grd.addColorStop(1, ex.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// DEBRIS — menos partículas
// ═══════════════════════════════════════════════════════
function addDebris(x, y, color) {
  for (let i = 0; i < 4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2.5;
    debris.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1, color,
      size: Math.random() * 2 + 1
    });
  }
}

function updateDebris() {
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.x += d.vx; d.y += d.vy;
    d.vy += 0.08; d.life -= 0.03;
    if (d.life <= 0) debris.splice(i, 1);
  }
}

function drawDebris() {
  for (let d of debris) {
    ctx.save();
    ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// COLLISION DETECTION
// ═══════════════════════════════════════════════════════
function checkCollisions() {
  for (const ex of explosions) {
    if (!ex.growing) continue;
    for (let j = missiles.length - 1; j >= 0; j--) {
      const m = missiles[j];
      if (Math.hypot(m.x - ex.x, m.y - ex.y) < ex.r + 4) {
        addExplosion(m.x, m.y, 38, m.color, false);
        addDebris(m.x, m.y, m.color);
        missiles.splice(j, 1);
        const pts = 25 * level;
        score += pts;
        spawnScoreText(m.x, m.y, pts);
        updateHUD();
      }
    }
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (Math.hypot(a.x - ex.x, a.y - ex.y) < ex.r + a.size) {
        a.hp--;
        if (a.hp <= 0) {
          addExplosion(a.x, a.y, 55 + a.size * 2, a.isRed ? '#ff4422' : '#aaaaaa', false);
          addDebris(a.x, a.y, a.color);
          if (a.isRed && a.size > 12) {
            for (let s = 0; s < 2; s++) {
              const sz = a.size * 0.5;
              const pts2 = [];
              for (let k = 0; k < 6; k++) {
                const ag = (k / 6) * Math.PI * 2;
                pts2.push({ x: Math.cos(ag)*sz*(0.65+Math.random()*0.35), y: Math.sin(ag)*sz*(0.65+Math.random()*0.35) });
              }
              asteroids.push({
                x: a.x+(s===0?-sz:sz), y: a.y,
                vx: Math.cos(Math.random()*Math.PI*2)*1.2,
                vy: Math.random()*1.5+0.5,
                rot: Math.random()*Math.PI*2,
                rotSpeed: (Math.random()-0.5)*0.06,
                pts: pts2, size: sz,
                color: '#ddddcc', isRed: false, hp: 1
              });
            }
          }
          asteroids.splice(j, 1);
          const pts = (a.isRed ? 75 : 40) * level;
          score += pts; spawnScoreText(a.x, a.y, pts); updateHUD();
        } else {
          addDebris(a.x, a.y, '#ffff88');
        }
      }
    }
    for (let j = guidedMissiles.length - 1; j >= 0; j--) {
      const gm = guidedMissiles[j];
      if (Math.hypot(gm.x - ex.x, gm.y - ex.y) < ex.r + 6) {
        addExplosion(gm.x, gm.y, 45, '#ff44ff', false);
        addDebris(gm.x, gm.y, gm.color);
        guidedMissiles.splice(j, 1);
        const pts = 60 * level;
        score += pts; spawnScoreText(gm.x, gm.y, pts); updateHUD();
      }
    }
    for (let j = satellites.length - 1; j >= 0; j--) {
      const sat = satellites[j];
      if (Math.hypot(sat.x - ex.x, sat.y - ex.y) < ex.r + 30) {
        addExplosion(sat.x, sat.y, 70, '#00eeff', false);
        addDebris(sat.x, sat.y, sat.color);
        satellites.splice(j, 1);
        const pts = 100 * level;
        score += pts; spawnScoreText(sat.x, sat.y, pts); updateHUD();
      }
    }
    for (let j = clusterBombs.length - 1; j >= 0; j--) {
      const cb = clusterBombs[j];
      if (Math.hypot(cb.x - ex.x, cb.y - ex.y) < ex.r + cb.size) {
        addExplosion(cb.x, cb.y, 60, '#ff8800', false);
        addDebris(cb.x, cb.y, cb.color);
        spawnClusterFragment(cb.x, cb.y);
        clusterBombs.splice(j, 1);
        const pts = 80 * level;
        score += pts; spawnScoreText(cb.x, cb.y, pts); updateHUD();
      }
    }
    for (let j = migFighters.length - 1; j >= 0; j--) {
      const mig = migFighters[j];
      if (Math.hypot(mig.x - ex.x, mig.y - ex.y) < ex.r + 20) {
        addExplosion(mig.x, mig.y, 80, '#ff4466', false);
        addDebris(mig.x, mig.y, mig.color);
        migFighters.splice(j, 1);
        const pts = 120 * level;
        score += pts; spawnScoreText(mig.x, mig.y, pts); updateHUD();
      }
    }
  }

  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    if (m.y >= GY - 2) {
      addExplosion(m.x, GY, 110, '#ff6600', true);
      addDebris(m.x, GY, m.color);
      missiles.splice(i, 1);
      for (let c of cities) {
        if (c.alive && Math.abs(c.x - m.x) < CITY_W) {
          c.alive = false;
          addExplosion(c.x, GY - 8, 140, '#ff4400', true);
        }
      }
      for (let b of bases) {
        if (b.active && Math.abs(b.x - m.x) < 18) {
          b.active = false;
          addExplosion(b.x, GY - 10, 75, '#4488ff', true);
        }
      }
    }
  }

  for (const ex of explosions) {
    if (!ex.ground || !ex.growing) continue;
    for (let c of cities) {
      if (c.alive && Math.abs(c.x - ex.x) < ex.r + 10) c.alive = false;
    }
    for (let b of bases) {
      if (b.active && Math.abs(b.x - ex.x) < ex.r + 10) {
        b.active = false;
        addExplosion(b.x, GY - 10, 40, '#4488ff', true);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// SCORE TEXT
// ═══════════════════════════════════════════════════════
function spawnScoreText(x, y, val) {
  scoreTexts.push({ x, y, val, alpha: 1, vy: -1.2 });
}

function updateDrawScoreTexts() {
  ctx.save();
  ctx.font = "bold 11px 'Courier New', monospace";
  ctx.textAlign = 'center';
  for (let i = scoreTexts.length - 1; i >= 0; i--) {
    const s = scoreTexts[i];
    s.y += s.vy; s.alpha -= 0.025;
    if (s.alpha <= 0) { scoreTexts.splice(i, 1); continue; }
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('+' + s.val, s.x, s.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// LEVEL LOGIC
// ═══════════════════════════════════════════════════════
function tickLevel() {
  if (level >= 3 && frameCount % Math.max(120, 320 - level * 10) === 0) {
    if (Math.random() < 0.55) spawnAsteroid();
  }
  if (level >= 5 && frameCount % Math.max(200, 450 - level * 12) === 0) {
    if (Math.random() < 0.4) spawnGuidedMissile();
  }
  if (level >= 7 && frameCount % Math.max(350, 600 - level * 15) === 0) {
    if (Math.random() < 0.35 && satellites.length < 2) spawnSatellite();
  }
  if (level >= 9 && frameCount % Math.max(180, 400 - level * 12) === 0) {
    if (Math.random() < 0.45 && clusterBombs.length < 3) spawnClusterBomb();
  }
  if (level >= 11 && frameCount % Math.max(280, 550 - level * 14) === 0) {
    if (Math.random() < 0.38 && migFighters.length < 2) spawnMigFighter();
  }

  if (missilesLeft > 0) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnMissile();
      missilesLeft--;
      const baseInterval = Math.max(40, 100 - (level - 1) * 3);
      spawnTimer = baseInterval + Math.floor(Math.random() * 20 - 10);
    }
    return;
  }

  if (!levelEnding) {
    if (missiles.length === 0 && interceptors.length === 0 &&
        asteroids.length === 0 && guidedMissiles.length === 0 &&
        clusterBombs.length === 0 && migFighters.length === 0) {
      levelEnding = true;
      levelEndTimer = 90;
    }
    return;
  }

  levelEndTimer--;
  if (levelEndTimer <= 0) advanceLevel();
}

function advanceLevel() {
  const alive = cities.filter(c => c.alive).length;
  score += alive * 100 * level;
  if (level >= MAX_LEVEL) {
    updateHUD();
    if (score > highScore) highScore = score;
    gameOver = true; running = false;
    setTimeout(showVictory, 800);
    return;
  }
  level++;
  if (level % 5 === 0) {
    const destroyed = bases.filter(b => !b.active);
    if (destroyed.length > 0) {
      const b = destroyed[0];
      b.active = true; b.y = GY;
      showLevelBanner('BASE RECUPERADA!\nNÍVEL ' + level + ' / ' + MAX_LEVEL);
    } else {
      showLevelBanner('NÍVEL ' + level + ' / ' + MAX_LEVEL);
    }
  } else {
    showLevelBanner('NÍVEL ' + level + ' / ' + MAX_LEVEL);
  }
  for (let b of bases) if (b.active) b.y = GY;
  updateHUD(); startLevel();
}

function showVictory() {
  document.getElementById('ov-title').textContent = 'VITÓRIA!';
  document.getElementById('ov-title').className = 'overlay-title';
  document.getElementById('ov-sub').textContent = 'TODOS OS 20 NÍVEIS CONCLUÍDOS';
  document.getElementById('ov-score').textContent = score.toLocaleString();
  document.getElementById('ov-level').textContent = MAX_LEVEL;
  document.getElementById('ov-stats').style.display = 'flex';
  document.getElementById('ov-btn').textContent = '[ JOGAR NOVAMENTE ]';
  document.getElementById('ov-tip').textContent = 'RECORDE: ' + highScore.toLocaleString();
  document.getElementById('ov-tip').style.display = 'block';
  document.getElementById('overlay').classList.remove('hidden');
}

function showLevelBanner(text) {
  const el = document.getElementById('level-banner');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1800);
}

function checkGameOver() {
  if (cities.filter(c => c.alive).length === 0) {
    if (score > highScore) highScore = score;
    gameOver = true; running = false;
    setTimeout(showGameOver, 800);
  }
}

function showGameOver() {
  document.getElementById('ov-title').textContent = 'GAME\nOVER';
  document.getElementById('ov-title').className = 'overlay-title red';
  document.getElementById('ov-sub').textContent = 'SUAS CIDADES FORAM DESTRUÍDAS';
  document.getElementById('ov-score').textContent = score.toLocaleString();
  document.getElementById('ov-level').textContent = level;
  document.getElementById('ov-stats').style.display = 'flex';
  document.getElementById('ov-btn').textContent = '[ JOGAR NOVAMENTE ]';
  document.getElementById('ov-tip').textContent = 'RECORDE: ' + highScore.toLocaleString();
  document.getElementById('ov-tip').style.display = 'block';
  document.getElementById('overlay').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════
// CROSSHAIR
// ═══════════════════════════════════════════════════════
const chEl = document.getElementById('crosshair');

function placeCrosshair(x, y) {
  chEl.style.left = x + 'px';
  chEl.style.top = y + 'px';
  chEl.style.opacity = '1';
  crosshairTimer = 18;
}

function hideCrosshairEl() {
  chEl.style.opacity = '0';
}

// ═══════════════════════════════════════════════════════
// INPUT — touch otimizado para mobile
// ═══════════════════════════════════════════════════════
function handleFire(cx, cy) {
  if (!running || gameOver) return;
  placeCrosshair(cx, cy);
  fire(cx, cy);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  // Suporta multi-touch: cada dedo dispara
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const rect = canvas.getBoundingClientRect();
    handleFire(t.clientX - rect.left, t.clientY - rect.top);
  }
}, { passive: false });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleFire(e.clientX - rect.left, e.clientY - rect.top);
});

// ═══════════════════════════════════════════════════════
// MAIN LOOP — requestAnimationFrame com frame throttle
// ═══════════════════════════════════════════════════════
let lastTime = 0;
const TARGET_FPS = 60;
const FRAME_INTERVAL = 1000 / TARGET_FPS;

function loop(timestamp) {
  requestAnimationFrame(loop);

  const delta = timestamp - lastTime;
  if (delta < FRAME_INTERVAL - 4) return; // cap fps
  lastTime = timestamp;

  // Sky
  ctx.fillStyle = '#000a05';
  ctx.fillRect(0, 0, W, H);

  if (stars.length > 0) drawStars();
  drawGround();

  if (running || gameOver) {
    for (let c of cities) drawCity(c);
    for (let b of bases) drawBase(b);
    drawMissiles();
    drawAsteroids();
    drawGuidedMissiles();
    drawSatellites();
    drawClusterBombs();
    drawMigFighters();
    drawInterceptors();
    drawExplosions();
    drawDebris();
    updateDrawScoreTexts();
  }

  if (!running) return;

  frameCount++;
  updateMissiles();
  updateAsteroids();
  updateGuidedMissiles();
  updateSatellites();
  updateClusterBombs();
  updateMigFighters();
  updateInterceptors();
  updateExplosions();
  updateDebris();
  checkCollisions();
  tickLevel();
  checkGameOver();

  if (crosshairTimer > 0) {
    crosshairTimer--;
    if (crosshairTimer === 0) hideCrosshairEl();
  }
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('ov-title').textContent = 'MISSILE\nCOMMAND';
  document.getElementById('ov-title').className = 'overlay-title';
  document.getElementById('ov-sub').textContent = 'DEFENDA SUA CIDADE';
  document.getElementById('ov-stats').style.display = 'none';
  document.getElementById('ov-tip').style.display = 'none';
  document.getElementById('ov-btn').textContent = '[ INICIAR ]';
  initGame();
  showLevelBanner('NÍVEL ' + level + ' / ' + MAX_LEVEL);
}

// ═══════════════════════════════════════════════════════
// SOUND ENGINE — Web Audio API (leve)
// ═══════════════════════════════════════════════════════
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

let masterGain = null;
function getMaster() {
  if (masterGain) return masterGain;
  const ac = getAC();
  masterGain = ac.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(ac.destination);
  return masterGain;
}

function makeEnv(ac, start, peak, end, t0, tAtk, tDec) {
  const g = ac.createGain();
  g.gain.setValueAtTime(start, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + tAtk);
  g.gain.exponentialRampToValueAtTime(end, t0 + tAtk + tDec);
  return g;
}

function sfxFire() {
  try {
    const ac = getAC(), t = ac.currentTime;
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.18);
    const env = makeEnv(ac, 0, 0.22, 0.001, t, 0.01, 0.18);
    osc.connect(env); env.connect(getMaster());
    osc.start(t); osc.stop(t + 0.22);
  } catch(e) {}
}

function sfxBoom(size) {
  try {
    const ac = getAC(), t = ac.currentTime;
    const vol = Math.min(0.8, size / 80);
    const bufLen = Math.floor(ac.sampleRate * 0.5);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(300, t);
    filter.frequency.exponentialRampToValueAtTime(80, t + 0.45);
    const env = makeEnv(ac, 0, vol * 0.6, 0.001, t, 0.008, 0.45);
    noise.connect(filter); filter.connect(env); env.connect(getMaster());
    noise.start(t); noise.stop(t + 0.55);
  } catch(e) {}
}

function sfxImpact() {
  try {
    const ac = getAC(), t = ac.currentTime;
    const bufLen = Math.floor(ac.sampleRate * 0.4);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(500, t);
    filter.frequency.exponentialRampToValueAtTime(60, t + 0.35);
    const env = makeEnv(ac, 0, 0.45, 0.001, t, 0.005, 0.35);
    noise.connect(filter); filter.connect(env); env.connect(getMaster());
    noise.start(t); noise.stop(t + 0.42);
  } catch(e) {}
}

function sfxCityDown() {
  try {
    const ac = getAC(), t = ac.currentTime;
    const bufLen = Math.floor(ac.sampleRate * 0.8);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(700, t);
    filter.frequency.exponentialRampToValueAtTime(40, t + 0.75);
    const env = makeEnv(ac, 0, 0.75, 0.001, t, 0.006, 0.75);
    noise.connect(filter); filter.connect(env); env.connect(getMaster());
    noise.start(t); noise.stop(t + 0.85);
  } catch(e) {}
}

function sfxLevelUp() {
  try {
    const ac = getAC();
    [440, 554, 659, 880].forEach((freq, i) => {
      const t = ac.currentTime + i * 0.1;
      const osc = ac.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq;
      const env = makeEnv(ac, 0, 0.18, 0.001, t, 0.01, 0.1);
      osc.connect(env); env.connect(getMaster());
      osc.start(t); osc.stop(t + 0.14);
    });
  } catch(e) {}
}

function sfxGameOver() {
  try {
    const ac = getAC();
    [330, 247, 185, 123].forEach((freq, i) => {
      const t = ac.currentTime + i * 0.22;
      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const env = makeEnv(ac, 0, 0.28, 0.001, t, 0.015, 0.22);
      osc.connect(env); env.connect(getMaster());
      osc.start(t); osc.stop(t + 0.26);
    });
  } catch(e) {}
}

function sfxVictory() {
  try {
    const ac = getAC();
    const notes = [523, 659, 784, 1047, 784, 1047];
    const durs  = [0.1, 0.1, 0.1, 0.2, 0.1, 0.3];
    let t = ac.currentTime;
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq;
      const env = makeEnv(ac, 0, 0.2, 0.001, t, 0.01, durs[i]);
      osc.connect(env); env.connect(getMaster());
      osc.start(t); osc.stop(t + durs[i] + 0.02);
      t += durs[i] + 0.04;
    });
  } catch(e) {}
}

// Hooks de som
const _origFire = fire;
fire = function(tx, ty) {
  const before = interceptors.length;
  _origFire(tx, ty);
  if (interceptors.length > before) sfxFire();
};

const _origAddExplosion = addExplosion;
addExplosion = function(x, y, maxR, color, ground) {
  _origAddExplosion(x, y, maxR, color, ground);
  if (ground) sfxImpact(); else sfxBoom(maxR);
};

const _origCheckCollisions = checkCollisions;
checkCollisions = function() {
  const before = cities.filter(c => c.alive).length;
  _origCheckCollisions();
  if (cities.filter(c => c.alive).length < before) sfxCityDown();
};

const _origAdvanceLevel = advanceLevel;
advanceLevel = function() {
  const lvlBefore = level;
  _origAdvanceLevel();
  if (running && level > lvlBefore) sfxLevelUp();
};

const _origShowGameOver = showGameOver;
showGameOver = function() { sfxGameOver(); _origShowGameOver(); };

const _origShowVictory = showVictory;
showVictory = function() { sfxVictory(); _origShowVictory(); };

// Init
initStars();
requestAnimationFrame(loop);
</script>
